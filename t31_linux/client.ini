# T31 Cat.1 integration — 见 doc/T31_CAT1_AT_COMMAND_SPEC.md
uart_dev=/dev/ttyS1
baudrate=115200
# Cat.1 GPIO29 低脉冲 → T31 PB27 下降沿（sysfs 59 = 32+27）
wake_gpio=59
read_timeout_ms=2000
wake_wait_timeout_ms=-1

# TCP 低功耗 / 业务长连接 → AT+SERVCREATE（字段逗号分隔，10 段）
[channel]
sid=1
server_ip=192.168.1.10
server_port=8000
login_hex=313233
login_rsp_hex=313233
heartbeat_hex=313233
heartbeat_sec=60
wake_hex=AA55
critical_flag=1
run_type=0

# MQTT 云 Broker → AT+MQTTCFG（字段分号分隔，6 段；与 [channel] 独立）
[mqtt]
mqtt_host=112.86.146.218
mqtt_port=2123
mqtt_ssl=0
mqtt_username=fptop1
mqtt_password=fptop1.com2025@#$&
mqtt_client_id=
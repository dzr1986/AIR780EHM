    enabled: false
    host: "112.86.146.218"
    port: 2123
    ssl: false
    username: "fptop1"
    password: "fptop1.com2025@#$&"
    client-id: "ota-server-bridge"
    subscribe-topics:
      - "/panshi/app/+/event"
    downlink-topic-template: "/panshi/device/{imei}/"
    # 设备 OTA 拉包地址（生产填 Nginx HTTPS 域名）
